<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MANSEF — Manipulation and Social Engineering Framework</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 32px 20px 48px;
    }

    /* ── Header ── */
    .page-header {
      text-align: center;
      margin-bottom: 36px;
    }
    .page-header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #ffffff;
    }
    .page-header .subtitle {
      font-size: 0.85rem;
      color: #7a8ba0;
      margin-top: 6px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .btn {
      background: #1e2532;
      border: 1px solid #2d3a4a;
      color: #a0b4c8;
      padding: 7px 18px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      transition: background 0.15s, color 0.15s;
    }
    .btn:hover { background: #2a3548; color: #e0e0e0; }

    /* ── Matrix grid ── */
    .matrix {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ── Column ── */
    .column { display: flex; flex-direction: column; gap: 8px; }

    /* ── Column header ── */
    .col-header {
      border-radius: 7px 7px 0 0;
      padding: 14px 16px;
      text-align: center;
    }
    .col-header .col-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #fff;
    }
    .col-header .col-count {
      font-size: 0.72rem;
      opacity: 0.75;
      margin-top: 3px;
      letter-spacing: 0.04em;
    }

    /* Column accent colors — Slate Blue / Teal / Amber / Crimson */
    .col-0 .col-header { background: #1a2a4a; border-bottom: 3px solid #4d90d9; }
    .col-1 .col-header { background: #0b3535; border-bottom: 3px solid #26a69a; }
    .col-2 .col-header { background: #3a2700; border-bottom: 3px solid #f9a825; }
    .col-3 .col-header { background: #3a0d0d; border-bottom: 3px solid #ef5350; }

    .col-0 .technique-card:hover,
    .col-0 .technique-card.open { border-left-color: #4d90d9; }
    .col-1 .technique-card:hover,
    .col-1 .technique-card.open { border-left-color: #26a69a; }
    .col-2 .technique-card:hover,
    .col-2 .technique-card.open { border-left-color: #f9a825; }
    .col-3 .technique-card:hover,
    .col-3 .technique-card.open { border-left-color: #ef5350; }

    .col-0 .tech-id { color: #5ea8f0; }
    .col-1 .tech-id { color: #2ec4b6; }
    .col-2 .tech-id { color: #ffb830; }
    .col-3 .tech-id { color: #f06565; }

    .col-0 .chevron { color: #5ea8f0; }
    .col-1 .chevron { color: #2ec4b6; }
    .col-2 .chevron { color: #ffb830; }
    .col-3 .chevron { color: #f06565; }

    /* ── Technique card ── */
    .technique-card {
      background: #1a2030;
      border: 1px solid #2a3548;
      border-left: 3px solid #2a3548;
      border-radius: 5px;
      cursor: pointer;
      transition: border-left-color 0.2s, background 0.15s;
      overflow: hidden;
    }
    .technique-card:hover { background: #1e2840; }
    .technique-card.open  { background: #1e2840; }

    .card-trigger {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 13px;
      gap: 8px;
      user-select: none;
    }

    .card-left { display: flex; align-items: center; gap: 9px; min-width: 0; }

    .tech-id {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .tech-name {
      font-size: 0.82rem;
      font-weight: 600;
      color: #d0dce8;
      line-height: 1.3;
    }

    .chevron {
      font-size: 0.65rem;
      flex-shrink: 0;
      transition: transform 0.25s ease;
      opacity: 0.8;
    }
    .technique-card.open .chevron { transform: rotate(180deg); }

    /* ── Expandable definition ── */
    .card-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease, padding 0.2s ease;
      padding: 0 13px;
    }
    .technique-card.open .card-body {
      max-height: 300px;
      padding: 0 13px 12px;
    }

    .divider {
      height: 1px;
      background: #2a3548;
      margin-bottom: 10px;
    }

    .definition {
      font-size: 0.78rem;
      color: #9bafc4;
      line-height: 1.6;
    }

    /* ── Footer ── */
    .page-footer {
      text-align: center;
      margin-top: 40px;
      font-size: 0.72rem;
      color: #3d4f62;
      letter-spacing: 0.05em;
    }

    /* ── Responsive ── */
    @media (max-width: 860px) {
      .matrix { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
      .matrix { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header class="page-header">
    <h1>MANSEF</h1>
    <p class="subtitle">Manipulation and Social Engineering Framework</p>
  </header>

  <div class="controls">
    <button class="btn" onclick="toggleAll(true)">Expand All</button>
    <button class="btn" onclick="toggleAll(false)">Collapse All</button>
  </div>

  <div class="matrix" id="matrix"></div>

  <footer class="page-footer">Click any technique to reveal its definition &nbsp;|&nbsp; MANSEF</footer>

  <script>
    const data = [
      {
        title: "Coercion",
        techniques: [
          {
            id: "C-1",
            name: "Use of Authority",
            definition: "Threat actors may choose to impersonate an individual with an actual or perceived amount of authority over the victim or the ability to make special requests on behalf of someone that does. This can increase the likelihood of a victim complying with unauthorized requests due to the fear of consequences for disobeying a direct request from a superior."
          },
          {
            id: "C-2",
            name: "Plea for Help",
            definition: "Threat actors may exploit the victim's kindness by making requests in a tone that elicits the desire to help or by showing a great deal of gratitude. This acts as a reward system for the victim when performing unauthorized actions on behalf of the threat actor who is perceived as someone in distress."
          },
          {
            id: "C-3",
            name: "Use of Urgency",
            definition: "Threat actors craft scenarios that involve time-sensitive requests of the victim. The drive to meet deadlines or assist someone in need of urgency can make the victim more willing to forego security processes in lieu of fulfilling requests in a timely manner."
          },
          {
            id: "C-4",
            name: "Trusted Relationship",
            definition: "Threat actors may reference a known associate of the victim as a trusted third party that can vouch for any requests made. The third party referenced will often be someone with authority to imply consequences if their requests aren't fulfilled."
          },
          {
            id: "C-5",
            name: "Disgruntled Employee",
            definition: "Threat actors may put on a demeanor of being upset or stressed in order to make the victim feel sympathy towards their perceived state. This could make the victim more likely to fulfill the threat actor's requests."
          }
        ]
      },
      {
        title: "Impersonation",
        techniques: [
          {
            id: "I-1",
            name: "Spoof Phone Number",
            definition: "Threat actors can utilize open-source software to make it appear as if they are calling from whoever's phone number they desire, bolstering the idea that they are the impersonated target."
          },
          {
            id: "I-2",
            name: "Voice-Changer Used",
            definition: "Threat actors can use tools to alter their voice, usually to sound a different age or gender, when speaking over the phone to bolster the idea that they are the impersonated target."
          },
          {
            id: "I-3",
            name: "Background Noise",
            definition: "Threat actors may use software to add background noises during calls to make it seem as though they were calling from a specific location."
          },
          {
            id: "I-4",
            name: "Revelation of 'Insider' Knowledge",
            definition: "Threat actors can relay seemingly non-public or exclusive information to establish a sense of belonging with an organization. This can be seen as threat actors using company lingo or acronyms."
          },
          {
            id: "I-5",
            name: "OSINT Discovery",
            definition: "Threat actors may be able to answer security identity questions or even obtain credentials from open-source applications such as social media platforms or public websites."
          },
          {
            id: "I-6",
            name: "Multiple Points of Contact",
            definition: "Prior to a vishing call, threat actors may contact the target through another channel, such as email, with some information establishing the pre-text narrative that can be referenced during the call. Multiple references to the same story create a sense of validity in the victim's mind."
          }
        ]
      },
      {
        title: "Discovery",
        techniques: [
          {
            id: "D-1",
            name: "Gather System Information",
            definition: "Threat actors may attempt to obtain information on the victim's systems or network that can be used in subsequent attacks. This information could include installed security technology, patch versions for applications, IP ranges, network topology, and trust dependencies."
          },
          {
            id: "D-2",
            name: "Gather Credentials",
            definition: "Threat actors may attempt to have the victim divulge their own, or even another individual's, credentials to gain initial access to a network or application."
          },
          {
            id: "D-3",
            name: "Gather Configuration Info",
            definition: "Threat actors may attempt to obtain information on the victim's device configurations that can be used in subsequent attacks. The information could be OS version, AV/EDR vendor and version, hardware specifics, etc."
          },
          {
            id: "D-4",
            name: "Gather Organizational Info",
            definition: "Threat actors may attempt to obtain information on the victim's organization that can be used in subsequent attacks. The information could be emailing format, employee list, proprietary information, etc."
          },
          {
            id: "D-5",
            name: "Gather PII",
            definition: "Threat actors may attempt to have the victim divulge personal identifiable information (PII), of themselves or another individual, which can be used for subsequent attacks or direct exploitation. The information could be a credit card number, social security number, home address, etc."
          }
        ]
      },
      {
        title: "Elicit Action",
        techniques: [
          {
            id: "EA-1",
            name: "Malicious SMS / Email",
            definition: "Threat actors may pair a vishing call with an email or SMS message containing a malicious payload. They can then talk the victim through the process of opening or downloading any malicious attachments, hence compromising the victim's device."
          },
          {
            id: "EA-2",
            name: "Edit Account Configuration",
            definition: "Threat actors may attempt to have the victim, such as an IT help desk, make changes to a user's account. These changes often reduce the overall security of the account, such as disabling MFA or increasing the number of failed login attempts before account lockout."
          },
          {
            id: "EA-3",
            name: "Reset Credentials",
            definition: "Threat actors may attempt to have the victim, such as an IT helpdesk, change the login credentials of an account or hand over the ability to do so. This often takes the form of the victim sending a reset password or MFA setup link to the threat actor."
          },
          {
            id: "EA-4",
            name: "Provision Access",
            definition: "Threat actors may attempt to have a victim with control over permissions provision unauthorized access to an account under the control of the attacker."
          },
          {
            id: "EA-5",
            name: "Provide Alternative Process",
            definition: "When making requests from the victim, threat actors can suggest processes outside of what's approved by the organization. An example would be when making a request to a service desk for a reset password link, the threat actor would suggest it to be sent to an email they provide rather than the official one on file."
          }
        ]
      }
    ];

    function buildMatrix() {
      const matrix = document.getElementById('matrix');
      data.forEach((col, colIdx) => {
        const colEl = document.createElement('div');
        colEl.className = `column col-${colIdx}`;

        // Header
        const header = document.createElement('div');
        header.className = 'col-header';
        header.innerHTML = `<div class="col-title">${col.title}</div>`;
        colEl.appendChild(header);

        // Technique cards
        col.techniques.forEach(tech => {
          const card = document.createElement('div');
          card.className = 'technique-card';
          card.innerHTML = `
            <div class="card-trigger" onclick="toggleCard(this.parentElement)">
              <div class="card-left">
                <span class="tech-id">${tech.id}</span>
                <span class="tech-name">${tech.name}</span>
              </div>
              <span class="chevron">▼</span>
            </div>
            <div class="card-body">
              <div class="divider"></div>
              <p class="definition">${tech.definition}</p>
            </div>
          `;
          colEl.appendChild(card);
        });

        matrix.appendChild(colEl);
      });
    }

    function toggleCard(card) {
      card.classList.toggle('open');
    }

    function toggleAll(open) {
      document.querySelectorAll('.technique-card').forEach(card => {
        if (open) card.classList.add('open');
        else card.classList.remove('open');
      });
    }

    buildMatrix();
  </script>
</body>
</html>
